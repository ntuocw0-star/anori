会崩溃、生日派对哭着跑出来\",\"aliases\":[\"超市里总会崩溃\",\"生日派对哭着跑出来\",\"学校餐厅吃不下\",\"医院诊所很难配合\",\"游泳课换衣服崩溃\",\"节假日不想出门\",\"人多地方走一会儿就不行\",\"突然的变化无法接受\",\"学校回来就崩溃\"],\"search_reason\":\"如果孩子在复杂环境里特别容易崩溃，这里帮你理解发生了什么。\",\"href\":\"/problems/prb-p007-006\",\"tags\":\"超市里总会崩溃 生日派对哭着跑出来 学校餐厅吃不下 医院诊所很难配合 游泳课换衣服崩溃 节假日不想出门 人多地方走一会儿就不行 突然的变化无法接受 学校回来就崩溃\",\"evidence_grade\":\"\",\"analytics_id\":\"PRB-P007-006\",\"analytics_type\":\"problem\"},{\"type\":\"方法\",\"title\":\"先观察，再判断\",\"body\":\"很多时候，先理解发生了什么，比急着找到答案更重要。 当家长不确定发生了什么时，最有价值的第一步不是找答案，而是先记录变化。 当你担心孩子某个变化，但还不知道是否需要专业评估时。\",\"summary\":\"很多时候，先理解发生了什么，比急着找到答案更重要。\",\"why\":\"当你担心孩子某个变化，但还不知道是否需要专业评估时。\",\"href\":\"/methods/mth-0001\",\"tags\":\"当你担心孩子某个变化，但还不知道是否需要专业评估时。\",\"evidence_grade\":\"\",\"analytics_id\":\"MTH-0001\",\"analytics_type\":\"method\"},{\"type\":\"方法\",\"title\":\"关注变化，不关注标签\",\"body\":\"孩子的一个行为不代表全部，变化的过程比某一刻的表现更重要。 观察孩子时，往往比单一行为更有价值的，是一段时间内的变化趋势。 当你开始担心孩子是否有某种情况，或者面对他人的判断时。\",\"summary\":\"孩子的一个行为不代表全部，变化的过程比某一刻的表现更重要。\",\"why\":\"当你开始担心孩子是否有某种情况，或者面对他人的判断时。\",\"href\":\"/methods/mth-0002\",\"tags\":\"当你开始担心孩子是否有某种情况，或者面对他人的判断时。\",\"evidence_grade\":\"\",\"analytics_id\":\"MTH-0002\",\"analytics_type\":\"method\"},{\"type\":\"方法\",\"title\":\"先理解，再行动\",\"body\":\"在采取行动之前，先花时间理解情况，通常能减少走弯路的次数。 很多时候，家长面对的困难不是缺少行动，而是还没有弄清楚问题的全貌。 当你感到需要立刻做点什么，但还不清楚从哪里开始时。\",\"summary\":\"在采取行动之前，先花时间理解情况，通常能减少走弯路的次数。\",\"why\":\"当你感到需要立刻做点什么，但还不清楚从哪里开始时。\",\"href\":\"/methods/mth-0003\",\"tags\":\"当你感到需要立刻做点什么，但还不清楚从哪里开始时。\",\"evidence_grade\":\"\",\"analytics_id\":\"MTH-0003\",\"analytics_type\":\"method\"},{\"type\":\"方法\",\"title\":\"一次解决一个问题\",\"body\":\"同时面对所有问题会让人瘫痪，先选一个最影响日常生活的，从这里开始。 把所有问题列出来之后，可以先问自己：哪一个，如果解决了，会让其他事情也变得容易一点？ 当你感到被很多事情同时压着，不知道先处理哪一件时。\",\"summary\":\"同时面对所有问题会让人瘫痪，先选一个最影响日常生活的，从这里开始。\",\"why\":\"当你感到被很多事情同时压着，不知道先处理哪一件时。\",\"href\":\"/methods/mth-0004\",\"tags\":\"当你感到被很多事情同时压着，不知道先处理哪一件时。\",\"evidence_grade\":\"\",\"analytics_id\":\"MTH-0004\",\"analytics_type\":\"method\"},{\"type\":\"方法\",\"title\":\"支持家庭，而不是只支持孩子\",\"body\":\"孩子不会脱离家庭成长，支持家庭，也是支持孩子。 照顾者的状态，往往直接影响孩子能获得的支持质量。家庭是一个整体，不是只有孩子需要被照顾。 当你觉得自己应该把所有注意力放在孩子身上，而忽略了自己或其他家庭成员的需求时。\",\"summary\":\"孩子不会脱离家庭成长，支持家庭，也是支持孩子。\",\"why\":\"当你觉得自己应该把所有注意力放在孩子身上，而忽略了自己或其他家庭成员的需求时。\",\"href\":\"/methods/mth-0005\",\"tags\":\"当你觉得自己应该把所有注意力放在孩子身上，而忽略了自己或其他家庭成员的需求时。\",\"evidence_grade\":\"\",\"analytics_id\":\"MTH-0005\",\"analytics_type\":\"method\"},{\"type\":\"方法\",\"title\":\"优先寻找可以改变的事情\",\"body\":\"先从今天能够做到的一件事开始，通常比等待最好的答案更容易。 不是所有情况都可以立刻改变，但往往总有一件事是今天可以开始的。从那里开始，通常比等待完整的解决方案更有效。 当你感到情况很难改变，或者不知道能做什么时。\",\"summary\":\"先从今天能够做到的一件事开始，通常比等待最好的答案更容易。\",\"why\":\"当你感到情况很难改变，或者不知道能做什么时。\",\"href\":\"/methods/mth-0006\",\"tags\":\"当你感到情况很难改变，或者不知道能做什么时。\",\"evidence_grade\":\"\",\"analytics_id\":\"MTH-0006\",\"analytics_type\":\"method\"},{\"type\":\"方法\",\"title\":\"长期比一次更重要\",\"body\":\"真正帮助理解变化的，通常不是一次结果，而是持续的观察。 一次评估、一次谈话、一次观察，往往不足以反映真实情况。持续关注同一件事，通常比一次深入更有价值。 当你刚完成一次评估或咨询，想知道接下来该怎么办时。\",\"summary\":\"真正帮助理解变化的，通常不是一次结果，而是持续的观察。\",\"why\":\"当你刚完成一次评估或咨询，想知道接下来该怎么办时。\",\"href\":\"/methods/mth-0007\",\"tags\":\"当你刚完成一次评估或咨询，想知道接下来该怎么办时。\",\"evidence_grade\":\"\",\"analytics_id\":\"MTH-0007\",\"analytics_type\":\"method\"},{\"type\":\"方法\",\"title\":\"记录比记忆更可靠\",\"body\":\"记录不是为了分析，而是为了让重要的变化不会被遗忘。 家长长期观察到的细节，往往是专业人员最需要、也最难从单次见面中获得的信息。把它写下来，通常比事后回忆更准确。 当你准备和医生、老师或专业人员谈话，或者想整理自己的观察时。\",\"summary\":\"记录不是为了分析，而是为了让重要的变化不会被遗忘。\",\"why\":\"当你准备和医生、老师或专业人员谈话，或者想整理自己的观察时。\",\"href\":\"/methods/mth-0008\",\"tags\":\"当你准备和医生、老师或专业人员谈话，或者想整理自己的观察时。\",\"evidence_grade\":\"\",\"analytics_id\":\"MTH-0008\",\"analytics_type\":\"method\"},{\"type\":\"主题\",\"title\":\"健康\",\"body\":\"身心状态的不确定性 孩子突然变了，找不到原因 孩子一直说身体不舒服，但检查又没问题 感觉孩子越来越退缩 整个家庭都在围着孩子的状态转 自己也很久没有真正休息过了 孩子突然变了 最近特别容易哭 最近特别容易发脾气 突然不愿意出门 最近总说肚子痛 最近睡不好 最近一直很累 最近吃得特别少 最近一直生病 不知道是不是身体原因 突然没有精神 最近越来越没有力气 最近一直喊痛 不知道是不是健康问题\",\"summary\":\"孩子突然变了，找不到原因\",\"triggers\":[\"孩子突然变了，找不到原因\",\"孩子一直说身体不舒服，但检查又没问题\",\"感觉孩子越来越退缩\",\"整个家庭都在围着孩子的状态转\",\"自己也很久没有真正休息过了\",\"孩子突然变了\",\"最近特别容易哭\",\"最近特别 响个人身份的重构。\",\"summary\":\"照顾者对自身在照顾角色中的自我定义、价值观和身份的感知，包括照顾如何影响个人身份的重构。\",\"href\":\"/resource\",\"tags\":\"Caregiver Identity Role Identity Identity Reconstruction Caregiver Values\",\"evidence_grade\":\"\",\"analytics_id\":\"VAR-000049\",\"analytics_type\":\"concept\"},{\"type\":\"知识\",\"title\":\"为什么很多家长坚持不下去？\",\"body\":\"不是意志力的问题，而是系统给的支撑不够 研究者访谈了来自 19 项研究的 297 位家长，想弄清楚为什么这么多家庭在开始使用 aac 之后又停下来了。他们发现，停下来的原因里，出现最多的不是「家长不够努力」，也不是「孩子没有进步」，而是三件事：专业支持在评估之后就中断了、学校和家里用的不是同一套 aac、以及家长同时承担了太多角色没有人来分担。这三件事，都不是靠「再努力一点」能解决的。 为什么坚持不下去 试过 aac 但孩子不用 学校用 aac 但家里不知道怎么配合 感觉撑不住了 专业人员不再跟进 aac 开始了但停下来了 aac 没有效果 不知道怎么继续\",\"summary\":\"不是意志力的问题，而是系统给的支撑不够\",\"triggers\":[\"为什么坚持不下去\",\"试过 AAC 但孩子不用\",\"学校用 AAC 但家里不知道怎么配合\",\"感觉撑不住了\",\"专业人员不再跟进\",\"AAC 开始了但停下来了\",\"AAC 没有效果\",\"不知道怎么继续\"],\"href\":\"/knowledge/ka-000001\",\"tags\":\"aac 辅助沟通 家长支持 坚持 家校协作\",\"evidence_grade\":\"high\",\"analytics_id\":\"KA-000001\",\"analytics_type\":\"ka\"},{\"type\":\"知识\",\"title\":\"学校和家里怎样才能说同一种语言？\",\"body\":\"家校 aac 不一致，不是谁的错，而是需要主动去建的桥 研究者访谈了来自 27 项研究的 319 位照顾者，专门研究家庭和学校在 aac 实施中的协作体验。他们发现，家校脱节的根本原因不是词汇不同，而是学校的 aac 目标以学业沟通为主，家庭的使用场景是日常需求和情绪表达——两套逻辑从来没有被放在一起对话过。而把这些信息整合起来的责任，通常落在家长身上，而不是专业团队。 学校用 aac 但家里不知道怎么配合 家校词汇不一致 孩子在学校用回家不用 家里有人反对 aac 专业人员之间不沟通 iep 我能参与吗 学校和家里说的不一样 家人不认可 aac 怎么办\",\"summary\":\"家校 AAC 不一致，不是谁的错，而是需要主动去建的桥\",\"triggers\":[\"学校用 AAC 但家里不知道怎么配合\",\"家校词汇不一致\",\"孩子在学校用回家不用\",\"家里有人反对 AAC\",\"专业人员之间不沟通\",\"IEP 我能参与吗\",\"学校和家里说的不一样\",\"家人不认可 AAC 怎么办\"],\"href\":\"/knowledge/ka-000002\",\"tags\":\"家校协作 aac 学校 沟通 词汇一致 家庭 专业人员\",\"evidence_grade\":\"high\",\"analytics_id\":\"KA-000002\",\"analytics_type\":\"ka\"},{\"type\":\"知识\",\"title\":\"父母压力：为什么努力以后还是会觉得累？\",\"body\":\"研究怎么说，以及今天可以做什么  \",\"summary\":\"研究怎么说，以及今天可以做什么\",\"triggers\":[],\"tags\":\"父母压力 照顾者 支持 疲惫 韧性\",\"evidence_grade\":\"\",\"analytics_id\":\"KA-000003\",\"analytics_type\":\"ka\"},{\"type\":\"资源\",\"title\":\"世界卫生组织\",\"title_en\":\"World Health Organization\",\"body\":\"world health organization 世界卫生组织 世界卫生组织（who）是联合国负责全球公共卫生工作的专门机构，为各国提供循证健康指南和政策建议。 当孩子的状态让你担心，第一反应往往是找一个具体的答案——但很多时候，问题不是某一件事出了问题，而是多个方面同时在影响孩子。who 的儿童健康资源帮助家长建立一个更完整的视角：健康、成长、发展、营养、保护和学习机会，都是相互关联的。作为基础框架，它提醒家长：孩子的状态不能只从一个症状判断，而要放回整个生活环境来理解。 child development disability family support health international organization who\",\"summary\":\"世界卫生组织（WHO）是联合国负责全球公共卫生工作的专门机构，为各国提供循证健康指南和政策建议。\",\"href\":\"/resource/res-000001\",\"tags\":\"world health organization 世界卫生组织 child development disability family support health\",\"evidence_grade\":\"\",\"analytics_id\":\"RES-000001\",\"analytics_type\":\"resource\"},{\"type\":\"资源\",\"title\":\"了解信号，及早行动\",\"title_en\":\"Learn the Signs. Act Early.\",\"body\":\"learn the signs. act early. 了解信号，及早行动 美国疾病控制与预防中心（cdc）负责公共卫生与疾病预防，并长期提供儿童发展和早期识别资源。 「感觉哪里不太对，但说不清楚」——这是很多家长在注意到孩子某些变化时的真实感受。cdc 的 learn the signs. act early. 帮助家长把这种模糊的感觉变成具体的观察：这个年龄的孩子通常会做什么，我的孩子在哪些地方有所不同？它不是用来给孩子下结论的工具，而是帮助家长把观察整理清楚，再决定是否需要和医生进一步讨论。 developmental milestones screening early intervention government agency cdc\",\"summary\":\"美国疾病控制与预防中心（CDC）负责公共卫生与疾病预防，并长期提供儿童发展和早期识别资源。\",\"href\":\"/resource/res-000002\",\"tags\":\"learn the signs. act early. 了解信号，及早行动 developmental milestones screening early intervention\",\"evidence_grade\":\"\",\"analytics_id\":\"RES-000002\",\"analytics_type\":\"resource\"},{\"type\":\"资源\",\"title\":\"联合国儿童基金会家长资源\",\"title_en\":\"UNICEF Parenting\",\"body\":\"unicef parenting 联合国儿童基金会家长资源 联合国儿童基金会（unicef）致力于促进全球儿童的健康、教育、保护和发展。 养育一个孩子本来就不容易，更不用说当孩子有特殊需求的时候。unicef parenting 的资源用家长可以读进去的语言，把儿童发展、日常照护、家庭支持和家长自身状态放在一起讲。它不提供单一的「正确答案」，而是帮助家长用更温和、更现实的方式看待养育过程中那些让人困惑或难受的部分。 parenting family support child development international organization unicef\",\"summary\":\"联合国儿童基金会（UNICEF）致力于促进全球儿童的健康、教育、保护和发展。\",\"href\":\"/resource/res-000003\",\"tags\":\"unicef parenting 联合国儿童基金会家长资源 parenting family support child development\",\"evidence_grade\":\"\",\"analytics_id\":\"RES-000003\",\"analytics_type\":\"resource\"},{\"type\":\"资源\",\"title\":\"英国国家健康与临床优化研究所\",\"title_en\":\"National Institute for Health and Care Excellence\",\"body\":\"national institute for health and care excellence 英国国家健康与临床优化研究所 英国国家健康与临床优化研究所（nice）负责制定英国医疗和社会照护领域的循证指南。 当你准备带孩子去评估，或者已经在等评估结果时，有时候最让人不安的是：不知道这个过程是怎么运作的。nice 的指南帮助家长理解专业系统是如何看待和处理自闭症评估的——它看哪些信息、通常怎么转介、家庭应该期望获得什么支持。读懂这个逻辑，不是为了自我诊断，而是让你在和专业人员对话时，不会完全摸不着头脑。 clinical guideline autism mental health disability guideline organization nice\",\"summary\":\"英国国家健康与临床优化研究所（NICE）负责制定英国医疗和社会照护领域的循证指南。\",\"href\":\"/resource/res-000004\",\"tags\":\"national institute for health and care excellence 英国国家健康与临床优化研究所 clinical guideline autism mental health disability\",\"evidence_grade\":\"\",\"analytics_id\":\"RES-000004\",\"analytics_type\":\"resource\"},{\"type\":\"资源\",\"title\":\"HealthyChildren 家长指南\",\"title_en\":\"HealthyChildren.org\",\"body\":\"healthychildren.org healthychildren 家长指南 美国儿科学会（aap）是美国最具代表性的儿科专业组织，长期发布儿童健康与养育建议。 healthychildren.org 是美国儿科学会面向家长的儿童健康网站，内容覆盖年龄阶段、健康生活、安全、家庭生活、发育和常见健康问题。它适合作为家长的基础参考：当不知道某个问题是否常见、是否需要咨询医生时，可以先用它整理问题。 child health parenting development professional organization aap\",\"summary\":\"美国儿科学会（AAP）是美国最具代表性的儿科专业组织，长期发布儿童健康与养育建议。\",\"href\":\"/resource/res-000005\",\"tags\":\"healthychildren.org healthychildren 家长指南 child health parenting development\",\"evidence_grade\":\"\",\"analytics_id\":\"RES-000005\",\"analytics_type\":\"resource\"},{\"type\":\"资源\",\"title\":\"照护者技能培训（CST）\",\"title_en\":\"Caregiver Skills Training\",\"body\":\"caregiver skills training 照护者技能培训（cst） who 开发的家庭照护者培训项目，帮助照护者在日常生活中支持儿童的发展。 cst 的重点不是训练孩子，而是帮助照护者把支持融入每天的生活，例如沟通、游戏和日常互动。它强调家庭参与，而不是把所有责任交给专业机构。 caregiver support early intervention family support international organization who\",\"summary\":\"WHO 开发的家庭照护者培训项目，帮助照护者在日常生活中支持儿童的发展。\",\"href\":\"/resource/res-000006\",\"tags\":\"caregiver skills training 照护者技能培训（cst） caregiver support early intervention family support\",\"evidence_grade\":\"\",\"analytics_id\":\"RES-000006\",\"analytics_type\":\"resource\"},{\"type\":\"资源\",\"title\":\"澳大利亚育儿网络\",\"title_en\":\"Raising Children Network\",\"body\":\"raising children network 澳大利亚育儿网络 澳大利亚政府支持的育儿知识平台，为家长提供儿童成长全过程的信息。 孩子某个阶段突然变了，家长不确定是正常发展还是需要关注——这个平台最擅长帮助家长理解「这个年龄的孩子通常是这样的」。它按年龄阶段组织内容，家长可以直接找到和孩子现在年龄对应的部分，而不是从头到尾阅读一份很长的指南。作为长期参考比作为一次性查询更有价值——值得书签保存，每隔一段时间回来看看孩子下一个阶段会发生什么。 parenting family support child development non-profit organization rcn\",\"summary\":\"澳大利亚政府支持的育儿知识平台，为家长提供儿童成长全过程的信息。\",\"href\":\"/resource/res-000007\",\"tags\":\"raising children network 澳大利亚育儿网络 parenting family support child development\",\"evidence_grade\":\"\",\"analytics_id\":\"RES-000007\",\"analytics_type\":\"resource\"},{\"type\":\"资源\",\"title\":\"Understood 家庭支持平台\",\"title_en\":\"Understood\",\"body\":\"understood understood 家庭支持平台 面向学习与注意力差异家庭的非营利平台。 很多家长发现，和学校的沟通比想象中困难——不是因为老师不好，而是大家关注的切入点不一样。understood 帮助家长从孩子在学校的真实体验出发理解学习和支持，而不是只停留在诊断名称上。如果你觉得孩子在学校的情况和家里「不像同一个孩子」，这里的内容可以帮助你把两个视角拼在一起。 learning school family support non-profit organization understood\",\"summary\":\"面向学习与注意力差异家庭的非营利平台。\",\"href\":\"/resource/res-000008\",\"tags\":\"understood understood 家庭支持平台 learning school family support\",\"evidence_grade\":\"\",\"analytics_id\":\"RES-000008\",\"analytics_type\":\"resource\"},{\"type\":\"资源\",\"title\":\"Family Voices\",\"title_en\":\"Family Voices\",\"body\":\"family voices family voices 由家庭组成的组织，帮助家长了解医疗、教育和社会支持系统。 刚开始面对孩子的特殊需求时，最让人迷失的感觉之一是：不知道该找谁。family voices 是美国最老牌的残障家庭资源导航机构，帮助家庭找到适合自己处境的专业支持和社区资源。它的核心立场是：家长是孩子支持团队的重要成员，不只是接受决定的一方——有权利参与、提问、甚至挑战。如果你在美国，且不知道从哪里开始，这里是一个可以起步的地方。 family support advocacy services non-profit organization family voices\",\"summary\":\"由家庭组成的组织，帮助家长了解医疗、教育和社会支持系统。\",\"href\":\"/resource/res-000009\",\"tags\":\"family voices family voices family support advocacy services\",\"evidence_grade\":\"\",\"analytics_id\":\"RES-000009\",\"analytics_type\":\"resource\"},{\"type\":\"资源\",\"title\":\"Zero to Three\",\"title_en\":\"Zero to Three\",\"body\":\"zero to three zero to three 专注于 0–3 岁儿童发展的专业机构。 孩子三岁以前发生的事，比很多家长意识到的影响更深远。zero to three 的资源帮助家长理解：早期的亲子关系、日常互动的质量、以及家庭环境的稳定性，都是孩子发展最重要的基础之一。它不是要家长成为早期教育专家，而是帮助家长看到：你每天和孩子相处的方式，本身就是对孩子最重要的支持。 early childhood development parenting professional organization ztt\",\"summary\":\"专注于 0–3 岁儿童发展的专业机构。\",\"href\":\"/resource/res-000010\",\"tags\":\"zero to three zero to three early childhood development parenting\",\"evidence_grade\":\"\",\"analytics_id\":\"RES-000010\",\"analytics_type\":\"resource\"},{\"type\":\"资源\",\"title\":\"全纳学习设计（UDL）\",\"title_en\":\"Universal Design for Learning (UDL)\",\"body\":\"universal design for learning (udl) 全纳学习设计（udl） cast 是美国非营利教育研究机构，提出了全纳学习设计（udl）框架，被国际教育界广泛采用。 udl 的核心不是给孩子特殊待遇，而是承认不同孩子有不同的学习方式。理解这一点，家长就不会再认为孩子跟不上是因为不够努力，而是因为学习方式还没有匹配。 learning school support inclusive education professional organization cast\",\"summary\":\"CAST 是美国非营利教育研究机构，提出了全纳学习设计（UDL）框架，被国际教育界广泛采用。\",\"href\":\"/resource/res-000011\",\"tags\":\"universal design for learning (udl) 全纳学习设计（udl） learning school support inclusive education\",\"evidence_grade\":\"\",\"analytics_id\":\"RES-000011\",\"analytics_type\":\"resource\"},{\"type\":\"资源\",\"title\":\"IRIS 教育支持中心\",\"title_en\":\"IRIS Center\",\"body\":\"iris center iris 教育支持中心 iris center 由美国范德比尔特大学运营，提供特殊教育与融合教育的专业培训资源。 有时候，家校之间的沟通困难，不是因为立场不同，而是因为双方使用的语言和框架完全不一样。iris 的资源原本面向教师，但家长读了之后往往会说：「原来老师是这样想的。」了解学校的决策逻辑，可以让家长在开会时问出更有效的问题，而不是带着困惑回家。这不是要你变成教育专家，而是让对话更对等。 school support inclusive education training research website iris\",\"summary\":\"IRIS Center 由美国范德比尔特大学运营，提供特殊教育与融合教育的专业培训资源。\",\"href\":\"/resource/res-000012\",\"tags\":\"iris center iris 教育支持中心 school support inclusive education training\",\"evidence_grade\":\"\",\"analytics_id\":\"RES-000012\",\"analytics_type\":\"resource\"},{\"type\":\"资源\",\"title\":\"特殊儿童委员会（CEC）\",\"title_en\":\"Council for Exceptional Children\",\"body\":\"council for exceptional children 特殊儿童委员会（cec） 国际特殊教育领域最具影响力的专业组织，制定特殊教育实践标准并支持教育专业人员。 很多家长在向学校要求支持时，内心有一个隐隐的担忧：我是不是在要求一些本来就不该有的东西？了解 cec（特殊儿童委员会）的存在，可以帮助家长建立一个基准认知：专业的特殊教育支持是有国际标准的，不是随意给的。要求孩子得到受过专业训练的支持，是家长的合理期待，不是无理取闹。 special education inclusive education school support professional organization cec\",\"summary\":\"国际特殊教育领域最具影响力的专业组织，制定特殊教育实践标准并支持教育专业人员。\",\"href\":\"/resource/res-000013\",\"tags\":\"council for exceptional children 特殊儿童委员会（cec） special education inclusive education school support\",\"evidence_grade\":\"\",\"analytics_id\":\"RES-000013\",\"analytics_type\":\"resource\"},{\"type\":\"资源\",\"title\":\"美国学习障碍全国中心（NCLD）\",\"title_en\":\"National Center for Learning Disabilities\",\"body\":\"national center for learning disabilities 美国学习障碍全国中心（ncld） 美国专注于学习差异的非营利组织，帮助家庭理解和支持有学习差异的孩子。 当孩子在学校一直跟不上，家长最容易陷入的一个想法是：是不是孩子不够努力，或者不够聪明？ncld 的核心立场是：学习差异和智力无关。很多孩子只是在某种特定的学习方式下表现不好，换一种方式会完全不同。理解这一点，不只是帮助孩子，也是在帮助家长放下一个不必要的自责。 learning school support family support non-profit organization ncld\",\"summary\":\"美国专注于学习差异的非营利组织，帮助家庭理解和支持有学习差异的孩子。\",\"href\":\"/resource/res-000014\",\"tags\":\"national center for learning disabilities 美国学习障碍全国中心（ncld） learning school support family support\",\"evidence_grade\":\"\",\"analytics_id\":\"RES-000014\",\"analytics_type\":\"resource\"},{\"type\":\"资源\",\"title\":\"联合国教科文组织 — 全纳教育\",\"title_en\":\"UNESCO Inclusive Education\",\"body\":\"unesco inclusive education 联合国教科文组织 — 全纳教育 unesco 是联合国负责教育、科学与文化的专门机构，推动全球全纳教育政策与实践。 全纳教育的核心不是让有特殊需求的孩子适应学校，而是让学校适应每一个孩子。这个立场改变了整个讨论的起点：问题不是孩子哪里不够好，而是系统如何为每个孩子创造参与的条件。 inclusive education policy school support legal rights international organization unesco\",\"summary\":\"UNESCO 是联合国负责教育、科学与文化的专门机构，推动全球全纳教育政策与实践。\",\"href\":\"/resource/res-000015\",\"tags\":\"unesco inclusive education 联合国教科文组织 — 全纳教育 inclusive education policy school support legal rights\",\"evidence_grade\":\"\",\"analytics_id\":\"RES-000015\",\"analytics_type\":\"resource\"},{\"type\":\"资源\",\"title\":\"幼儿自闭症修订版筛查表（M-CHAT-R/F）\",\"title_en\":\"Modified Checklist for Autism in Toddlers (M-CHAT-R/F)\",\"body\":\"modified checklist for autism in toddlers (m-chat-r/f) 幼儿自闭症修订版筛查表（m-chat-r/f） m-chat-r/f 是目前使用最广泛的幼儿自闭症早期筛查工具之一，适用于 16-30 个月的幼儿。 当家长对孩子的某些行为或发展感到担心，很容易就开始在网上搜索自闭症的症状——但那样得到的往往是更多的焦虑，而不是更清晰的认识。m-chat 提供了一个更有结构的方式：一份由研究开发的问卷，帮助家长和医生共同判断是否需要做更深入的评估。重要的是：它的结果不是诊断，筛查偏高不等于自闭症，偏低也不等于可以完全放心。它只是帮助决定「下一步是什么」。 screening asd early intervention assessment / screening m-chat\",\"summary\":\"M-CHAT-R/F 是目前使用最广泛的幼儿自闭症早期筛查工具之一，适用于 16-30 个月的幼儿。\",\"href\":\"/resource/res-000016\",\"tags\":\"modified checklist for autism in toddlers (m-chat-r/f) 幼儿自闭症修订版筛查表（m-chat-r/f） screening asd early intervention\",\"evidence_grade\":\"\",\"analytics_id\":\"RES-000016\",\"analytics_type\":\"resource\"},{\"type\":\"资源\",\"title\":\"年龄与发育进程问卷（ASQ）\",\"title_en\":\"Ages & Stages Questionnaires (ASQ)\",\"body\":\"ages & stages questionnaires (asq) 年龄与发育进程问卷（asq） asq 是一套被广泛使用的儿童发展问卷，覆盖 1 个月到 5 岁半，由家长填写，用于观察儿童发展进程。 很多发展上的担心，来自家长一个人在默默观察，却不知道观察到的是否正常。asq 把这种「散落的观察」变成有结构的图像：每个问题对应一个发展领域，帮助家长看清楚孩子目前在哪里，哪些地方值得继续关注。它让家长成为发展观察的参与者，而不是只在等专业人员告诉他们答案。 developmental milestones screening early intervention assessment / screening asq\",\"summary\":\"ASQ 是一套被广泛使用的儿童发展问卷，覆盖 1 个月到 5 岁半，由家长填写，用于观察儿童发展进程。\",\"href\":\"/resource/res-000017\",\"tags\":\"ages & stages questionnaires (asq) 年龄与发育进程问卷（asq） developmental milestones screening early intervention\",\"evidence_grade\":\"\",\"analytics_id\":\"RES-000017\",\"analytics_type\":\"resource\"},{\"type\":\"资源\",\"title\":\"长处与困难问卷（SDQ）\",\"title_en\":\"Strengths and Difficulties Questionnaire (SDQ)\",\"body\":\"strengths and difficulties questionnaire (sdq) 长处与困难问卷（sdq） sdq 是一份简短的儿童行为与情绪问卷，可由家长、老师或孩子本人填写，覆盖 4-17 岁。 大多数评估工具只问孩子哪里有困难，但 sdq 不一样——它同时问孩子有哪些优势。这个设计不是为了让评估「看起来更正面」，而是因为理解一个孩子，不能只看他做不到的事。如果你想要一个把孩子的长处也放进框架的工具，sdq 是少数真正做到这一点的选择，而且有中文版。 mental health behaviour screening school support assessment / screening sdq\",\"summary\":\"SDQ 是一份简短的儿童行为与情绪问卷，可由家长、老师或孩子本人填写，覆盖 4-17 岁。\",\"href\":\"/resource/res-000018\",\"tags\":\"strengths and difficulties questionnaire (sdq) 长处与困难问卷（sdq） mental health behaviour screening school support\",\"evidence_grade\":\"\",\"analytics_id\":\"RES-000018\",\"analytics_type\":\"resource\"},{\"type\":\"资源\",\"title\":\"Vineland 适应行为量表\",\"title_en\":\"Vineland Adaptive Behavior Scales\",\"body\":\"vineland adaptive behavior scales vineland 适应行为量表 vineland 是国际上最常用的适应行为评估工具之一，由专业人员使用，评估孩子在真实生活中的独立能力。 拿到评估报告，里面出现了「适应行为」这个词——很多家长不确定这是什么意思。vineland 评估的不是孩子在测试房间里的表现，而是孩子在真实生活中实际能做什么：穿衣、沟通、和别人互动。这个区别很重要：孩子在评估室里的表现，往往和家里不一样。了解 vineland 在测什么，可以帮助家长更准确地解读评估结果。 adaptive behaviour diagnosis developmental disability assessment / screening vineland\",\"summary\":\"Vineland 是国际上最常用的适应行为评估工具之一，由专业人员使用，评估孩子在真实生活中的独立能力。\",\"href\":\"/resource/res-000019\",\"tags\":\"vineland adaptive behavior scales vineland 适应行为量表 adaptive behaviour diagnosis developmental disability\",\"evidence_grade\":\"\",\"analytics_id\":\"RES-000019\",\"analytics_type\":\"resource\"},{\"type\":\"资源\",\"title\":\"理解评估与测评结果\",\"title_en\":\"Understanding Evaluations and Assessments\",\"body\":\"understanding evaluations and assessments 理解评估与测评结果 child mind institute 是美国专注于儿童心理健康与学习的非营利机构，提供大量面向家长的资源。 拿到评估报告是一件既重要又容易让家长不知所措的事。cmi 的资源帮助家长理解：评估报告在说什么、哪些是最关键的信息、以及如何用这份报告和学校或医疗团队沟通。评估不是终点，而是理解孩子的起点。 diagnosis assessment / screening family support ngo resource cmi\",\"summary\":\"Child Mind Institute 是美国专注于儿童心理健康与学习的非营利机构，提供大量面向家长的资源。\",\"href\":\"/resource/res-000020\",\"tags\":\"understanding evaluations and assessments 理解评估与测评结果 diagnosis assessment / screening family support\",\"evidence_grade\":\"\",\"analytics_id\":\"RES-000020\",\"analytics_type\":\"resource\"},{\"type\":\"资源\",\"title\":\"澳大利亚国家残障保险计划（NDIS）\",\"title_en\":\"NDIS — National Disability Insurance Scheme\",\"body\":\"ndis — national disability insurance scheme 澳大利亚国家残障保险计划（ndis） ndis 是澳大利亚为有永久性残障的人士提供个别化资金支持的国家计划。 ndis 不是一次性补贴，而是一套根据每个人的具体需求制定的个别支持计划。对有特殊需求孩子的家庭来说，最重要的是了解如何提交申请、如何说明孩子的功能影响，以及如何要求支持协调服务。 disability benefits government support funding care planning government agency ndia\",\"summary\":\"NDIS 是澳大利亚为有永久性残障的人士提供个别化资金支持的国家计划。\",\"href\":\"/resource/res-000021\",\"tags\":\"ndis — national disability insurance scheme 澳大利亚国家残障保险计划（ndis） disability benefits government support funding care planning\",\"evidence_grade\":\"\",\"analytics_id\":\"RES-000021\",\"analytics_type\":\"resource\"},{\"type\":\"资源\",\"title\":\"英国残障生活津贴与儿童残障付款（DLA/CDP）\",\"title_en\":\"Disability Living Allowance & Child Disability Payment\",\"body\":\"disability living allowance & child disability payment 英国残障生活津贴与儿童残障付款（dla/cdp） dla（残障生活津贴）是英国政府为有残障或特殊健康需求的16岁以下儿童家庭提供的现金支持。 dla 不需要家庭通过收入审查，只根据孩子的照顾和出行需求评估。申请表格较长，但填写时建议描述孩子在「最差状态」下的情况，而非平均水平。苏格兰的对应项目叫 child disability payment（cdp）。 disability benefits government support child disability financial aid government agency dwp / sss\",\"summary\":\"DLA（残障生活津贴）是英国政府为有残障或特殊健康需求的16岁以下儿童家庭提供的现金支持。\",\"href\":\"/resource/res-000022\",\"tags\":\"disability living allowance & child disability payment 英国残障生活津贴与儿童残障付款（dla/cdp） disability benefits government support child disability financial aid\",\"evidence_grade\":\"\",\"analytics_id\":\"RES-000022\",\"analytics_type\":\"resource\"},{\"type\":\"资源\",\"title\":\"新加坡残障支持局 — 经济援助计划\",\"title_en\":\"SG Enable — Financial Assistance Schemes\",\"body\":\"sg enable — financial assistance schemes 新加坡残障支持局 — 经济援助计划 sg enable 是新加坡政府统筹残障服务和援助计划的专责机构，提供多种面向残障人士及其家庭的经济支持。 在新加坡有残障或特殊需求孩子的家庭，往往不缺乏支持的意愿，而是不知道有哪些渠道可以申请。sg enable 整合了多个政府援助计划，包括帮助居家照顾者的现金补贴、购买辅具的资金支持，以及照顾者培训课程。网站提供中英双语，华语家庭可以直接使用，是新加坡家庭了解经济支持最完整的起点。 disability benefits government support asia financial aid government agency sge\",\"summary\":\"SG Enable 是新加坡政府统筹残障服务和援助计划的专责机构，提供多种面向残障人士及其家庭的经济支持。\",\"href\":\"/resource/res-000023\",\"tags\":\"sg enable — financial assistance schemes 新加坡残障支持局 — 经济援助计划 disability benefits government support asia financial aid\",\"evidence_grade\":\"\",\"analytics_id\":\"RES-000023\",\"analytics_type\":\"resource\"},{\"type\":\"资源\",\"title\":\"伊斯特印章基金会 — 经济资源导航\",\"title_en\":\"Easter Seals — Financial Resources Navigator\",\"body\":\"easter seals — financial resources navigator 伊斯特印章基金会 — 经济资源导航 easter seals 是北美历史最悠久的残障服务机构之一，为各年龄段残障人士及其家庭提 件的员工每年最多12周的无薪保职假期，用于照顾有严重健康状况的家庭成员。 很多家长不知道照顾有特殊医疗需求的孩子属于 fmla 的适用范围。关键条件是：在过去12个月内为同一雇主工作满一年且累计工时达1250小时，且雇主员工人数在50人以上。申请 fmla 不会自动获批——需要填写表格并提供医疗证明，建议提前与 hr 沟通。 family leave employment rights fmla caregiver leave government agency us dol\",\"summary\":\"FMLA 是美国联邦法律，保障符合条件的员工每年最多12周的无薪保职假期，用于照顾有严重健康状况的家庭成员。\",\"href\":\"/resource/res-000037\",\"tags\":\"us department of labor — fmla guide for employees 美国劳工部 — 家庭与医疗假法（fmla）员工指南 family leave employment rights fmla caregiver leave\",\"evidence_grade\":\"\",\"analytics_id\":\"RES-000037\",\"analytics_type\":\"resource\"},{\"type\":\"资源\",\"title\":\"英国2023年照顾者假期法 — 员工权利指南\",\"title_en\":\"Carer's Leave Act 2023 — Employee Rights Guide\",\"body\":\"carer's leave act 2023 — employee rights guide 英国2023年照顾者假期法 — 员工权利指南 2023年4月，英国通过《照顾者假期法》，首次赋予所有员工无需等待一年服务期即可申请照顾假的法定权利。 《照顾者假期法》是英国职场照顾者权利的重要进展：从2024年4月起，任何员工从第一天上班起即可申请照顾假，不需要提供证明文件，只需要告知雇主「需要照顾一位依赖者」即可。这一周可以分散使用（例如每周一天，连续五周）。 carer's leave employment rights uk family leave workplace rights government agency uk dbt\",\"summary\":\"2023年4月，英国通过《照顾者假期法》，首次赋予所有员工无需等待一年服务期即可申请照顾假的法定权利。\",\"href\":\"/resource/res-000038\",\"tags\":\"carer's leave act 2023 — employee rights guide 英国2023年照顾者假期法 — 员工权利指南 carer's leave employment rights uk family leave workplace rights\",\"evidence_grade\":\"\",\"analytics_id\":\"RES-000038\",\"analytics_type\":\"resource\"},{\"type\":\"资源\",\"title\":\"英国弹性工作基金会 — 员工申请弹性工作指南\",\"title_en\":\"Flexible Working Foundation — Guide for Employees\",\"body\":\"flexible working foundation — guide for employees 英国弹性工作基金会 — 员工申请弹性工作指南 flexible working foundation 是专注推动英国职场弹性化的非营利机构，提供雇主和员工双方的实用资源。 从2024年4月起，英国员工从入职第一天起即可提出弹性工作申请（flexible working request），雇主必须在两个月内回应并说明拒绝理由。这份指南帮助照顾者理解如何写一份有说服力的申请，以及如果被拒绝了有哪些选项。 flexible work remote work part-time work arrangement uk non-profit organization fwf\",\"summary\":\"Flexible Working Foundation 是专注推动英国职场弹性化的非营利机构，提供雇主和员工双方的实用资源。\",\"href\":\"/resource/res-000039\",\"tags\":\"flexible working foundation — guide for employees 英国弹性工作基金会 — 员工申请弹性工作指南 flexible work remote work part-time work arrangement uk\",\"evidence_grade\":\"\",\"analytics_id\":\"RES-000039\",\"analytics_type\":\"resource\"},{\"type\":\"资源\",\"title\":\"国际劳工组织 — 工作与家庭：迈向新的工作生活协调形式\",\"title_en\":\"ILO — Work and Family: Towards New Forms of Work-Life Articulation\",\"body\":\"ilo — work and family: towards new forms of work-life articulation 国际劳工组织 — 工作与家庭：迈向新的工作生活协调形式 ilo 的工作与家庭专题汇集了全球工作-照顾协调的政策研究和各国比较数据，是了解国际背景的权威来源。 当照顾者面临工作与照顾的冲突时，了解所在国的政策背景有助于更清楚地知道自己的权利边界在哪里。这份 ilo 资源提供了100多个国家的政策对比，特别适合在多个国家有工作经历、或对所在国政策不熟悉的照顾者参考。 work-life balance family policy flexible work international care policy international organization ilo\",\"summary\":\"ILO 的工作与家庭专题汇集了全球工作-照顾协调的政策研究和各国比较数据，是了解国际背景的权威来源。\",\"href\":\"/resource/res-000040\",\"tags\":\"ilo — work and family: towards new forms of work-life articulation 国际劳工组织 — 工作与家庭：迈向新的工作生活协调形式 work-life balance family policy flexible work international care policy\",\"evidence_grade\":\"\",\"analytics_id\":\"RES-000040\",\"analytics_type\":\"resource\"},{\"type\":\"资源\",\"title\":\"女性重返职场 — 再就业项目指南\",\"title_en\":\"Women Returners — Back to Work Programmes\",\"body\":\"women returners — back to work programmes 女性重返职场 — 再就业项目指南 women returners 是英国乃至全球最具代表性的女性重返职场支持网络，专注于因照顾责任而中断职业生涯的群体。 很多因照顾孩子而离职的女性，在想重返职场时面临「简历空缺如何解释」和「信心如何恢复」两个核心困难。women returners 的 returnship 项目（通常为3-6个月的有薪返岗实习）是被越来越多大型雇主采用的路径，帮助离职者以低风险方式重新接触职场。 return to work career break reentry women returnship non-profit organization women returners\",\"summary\":\"Women Returners 是英国乃至全球最具代表性的女性重返职场支持网络，专注于因照顾责任而中断职业生涯的群体。\",\"href\":\"/resource/res-000041\",\"tags\":\"women returners — back to work programmes 女性重返职场 — 再就业项目指南 return to work career break reentry women returnship\",\"evidence_grade\":\"\",\"analytics_id\":\"RES-000041\",\"analytics_type\":\"resource\"},{\"type\":\"资源\",\"title\":\"美国退休人员协会 — 50岁以上重返职场计划\",\"title_en\":\"AARP — Back to Work 50+\",\"body\":\"aarp — back to work 50+ 美国退休人员协会 — 50岁以上重返职场计 ,\"tags\":\"mind tools — work-life balance assessment mind tools — 工作与生活平衡自我评估 work-life balance self-assessment stress management career planning\",\"evidence_grade\":\"\",\"analytics_id\":\"RES-000044\",\"analytics_type\":\"resource\"},{\"type\":\"资源\",\"title\":\"F2F — 美国家庭对家庭健康信息中心\",\"title_en\":\"Family to Family Health Information Centers (F2F HICs)\",\"body\":\"family to family health information centers (f2f hics) f2f — 美国家庭对家庭健康信息中心 f2f hics 是美国联邦政府资助的家庭支持中心网络，由有特殊需求孩子的家长运营，为同样处境的家长提供支持。 很多照顾者在某个阶段会发现：专业人员可以解释孩子的状况，但只有另一个经历过同样事情的家长，才真正知道那是什么感觉。f2f hics 的核心就是这个：由有特殊需求孩子的家长，为同样处境的家长提供一对一的同伴支持和信息导航。在每个美国州都有本地中心，可以直接联系，免费，不需要转介。不是热线，不是数据库——而是一个有过类似经历的人，愿意陪你想清楚下一步。 peer support family navigation parent-to-parent special needs connection non-profit organization f2f hics\",\"summary\":\"F2F HICs 是美国联邦政府资助的家庭支持中心网络，由有特殊需求孩子的家长运营，为同样处境的家长提供支持。\",\"href\":\"/resource/res-000045\",\"tags\":\"family to family health information centers (f2f hics) f2f — 美国家庭对家庭健康信息中心 peer support family navigation parent-to-parent special needs connection\",\"evidence_grade\":\"\",\"analytics_id\":\"RES-000045\",\"analytics_type\":\"resource\"},{\"type\":\"资源\",\"title\":\"英国照顾者协会 — 照顾者线上社群与同伴论坛\",\"title_en\":\"Carers UK — Online Community and Peer Forums\",\"body\":\"carers uk — online community and peer forums 英国照顾者协会 — 照顾者线上社群与同伴论坛 carers uk 的线上社群是英国最大的照顾者互助空间，提供全天候的同伴连接和论坛讨论。 照顾的孤独往往在深夜最重——当孩子终于睡着，你一个人坐着，不知道明天怎么办。carers uk 的线上社群在这种时候可以是一个出口：不需要解释太多背景，因为在那里的人都是照顾者，他们大概知道那种感觉。论坛按主题分区（疲惫、工作、家庭关系、喘息……），可以读别人的分享，也可以自己写，没有强制参与的要求。加入不需要理由，退出也不需要。 peer support online community carer connection forum uk non-profit organization carers uk\",\"summary\":\"Carers UK 的线上社群是英国最大的照顾者互助空间，提供全天候的同伴连接和论坛讨论。\",\"href\":\"/resource/res-000046\",\"tags\":\"carers uk — online community and peer forums 英国照顾者协会 — 照顾者线上社群与同伴论坛 peer support online community carer connection forum uk\",\"evidence_grade\":\"\",\"analytics_id\":\"RES-000046\",\"analytics_type\":\"resource\"},{\"type\":\"资源\",\"title\":\"自闭症自我倡导网络 — 社区连接资源\",\"title_en\":\"ASAN — Autistic Self Advocacy Network\",\"body\":\"asan — autistic self advocacy network 自闭症自我倡导网络 — 社区连接资源 asan 是美国由自闭症人士领导的最重要的权益倡导组织，其资源帮助家长听到另一种声音。 照顾有自闭症孩子的家长，往往长期在「家长视角」里理解孩子。asan 提供的是另一个维度：自闭症成年人如何描述自己的需要、自己的困难、以及什么样的支持对他们真正有意义。这不是要家长听从指令，而是让理解更完整。很多家长在接触 asan 的内容之后会说：「我以前没有从这个角度想过。」这里也有社区空间，让家长和自我倡导者可以共同思考支持的方向。 community advocacy autism peer network disability rights connect non-profit organization asan\",\"summary\":\"ASAN 是美国由自闭症人士领导的最重要的权益倡导组织，其资源帮助家长听到另一种声音。\",\"href\":\"/resource/res-000047\",\"tags\":\"asan — autistic self advocacy network 自闭症自我倡导网络 — 社区连接资源 community advocacy autism peer network disability rights connect\",\"evidence_grade\":\"\",\"analytics_id\":\"RES-000047\",\"analytics_type\":\"resource\"},{\"type\":\"资源\",\"title\":\"国际融合协会 — 全球家庭网络\",\"title_en\":\"Inclusion International — Global Family Network\",\"body\":\"inclusion international — global family network 国际融合协会 — 全球家庭网络 inclusion international 是全球最大的智力残障家庭支持组织联合会，连接115个国家的本地家庭组织。 有智力残障孩子的家庭，有时候会感到自己生活在一个很小的圆圈里——周围没有人有类似的经历，连可以分享的对象都很难找到。inclusion international 做的事情是把这些分散的家庭连接起来：在115个国家有成员组织，其中包括台湾、香港、新加坡和多个亚太地区的机构。通过它，你可以找到所在国或地区的家庭支持组织，从全球网络找到你所在社区里的同路人。 global network family connection intellectual disability inclusion international connect international organization inclusion intl\",\"summary\":\"Inclusion International 是全球最大的智力残障家庭支持组织联合会，连接115个国家的本地家庭组织。\",\"href\":\"/resource/res-000048\",\"tags\":\"inclusion international — global family network 国际融合协会 — 全球家庭网络 global network family connection intellectual disability inclusion international connect\",\"evidence_grade\":\"\",\"analytics_id\":\"RES-000048\",\"analytics_type\":\"resource\"},{\"type\":\"资源\",\"title\":\"Contact — 英国残障儿童家庭互助组织\",\"title_en\":\"Contact — For Families with Disabled Children (UK)\",\"body\":\"contact — for families with disabled children (uk) contact — 英国残障儿童家庭互助组织 contact 是英国最专注于残障儿童家庭同伴连接的慈善机构，由有类似经历的家庭运营。 有残障孩子的家庭，常常有一种感觉：就算解释了很多，外面的人也很难真正明白。contact 是英国专门为这种感觉设计 const _ANA_DEBUG = false; // set true locally to enable console.debug
const _ANA_LS_KEY = 'anori_search_events_v1_1';
const _ANA_MAX_EVENTS = 1000;
const _ANA_MAX_AGE_MS = 30 * 24 * 60 * 60 * 1000;
const _ANA_SESSION_KEY = 'anori_search_session_id';
let _ANA_MEM_SESSION = null;

function _anaGenId() {
  if (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') {
    return crypto.randomUUID();
  }
  return Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 9);
}

function _anaGetSessionId() {
  try {
    let id = sessionStorage.getItem(_ANA_SESSION_KEY);
    if (!id) { id = _anaGenId(); sessionStorage.setItem(_ANA_SESSION_KEY, id); }
    return id;
  } catch {
    if (!_ANA_MEM_SESSION) _ANA_MEM_SESSION = _anaGenId();
    return _ANA_MEM_SESSION;
  }
}

function _anaNormQuery(raw) {
  return raw.trim().normalize('NFKC').toLowerCase().replace(/\s+/g, ' ');
}

function _anaLoadEvents() {
  try {
    const raw = localStorage.getItem(_ANA_LS_KEY);
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : [];
  } catch { return []; }
}

function _anaEvict(events) {
  const now = Date.now();
  const fresh = events.filter(e => now - e.ts <= _ANA_MAX_AGE_MS);
  return fresh.length > _ANA_MAX_EVENTS ? fresh.slice(fresh.length - _ANA_MAX_EVENTS) : fresh;
}

function _anaAppend(event) {
  try {
    const events = _anaEvict(_anaLoadEvents());
    events.push(event);
    localStorage.setItem(_ANA_LS_KEY, JSON.stringify(events));
    if (_ANA_DEBUG) console.debug('[Analytics]', event.event, event);
  } catch { /* silent */ }
}

function _anaBase(search_id, query) {
  return {
    schema_version: '1.1',
    event_id: _anaGenId(),
    search_id,
    ts: Date.now(),
    session_id: _anaGetSessionId(),
    query: query.trim(),
    query_norm: _anaNormQuery(query),
    locale: (typeof document !== 'undefined' ? document.documentElement.lang : undefined) || undefined,
  };
}

function _anaTrackQuery(search_id, query, result_count, source) {
  try {
    _anaAppend({ ..._anaBase(search_id, query), event: 'search.query', result_count, source });
    if (result_count === 0) {
      _anaAppend({ ..._anaBase(search_id, query), event: 'search.no_result' });
    }
  } catch { /* silent */ }
}

function _anaTrackClarifierShown(search_id, query, clarifiers) {
  try {
    _anaAppend({ ..._anaBase(search_id, query), event: 'search.clarifier_shown', clarifiers });
  } catch { /* silent */ }
}

function _anaTrackClarifierClick(search_id, query, clarifier_value, clarifier_index, destination_url) {
  try {
    _anaAppend({ ..._anaBase(search_id, query), event: 'search.clarifier_click', clarifier_value, clarifier_index, destination_url });
  } catch { /* silent */ }
}

function _anaTrackResultClick(search_id, query, result_id, result_type, result_index, result_url) {
  try {
    _anaAppend({ ..._anaBase(search_id, query), event: 'search.result_click', result_id, result_type, result_index, result_url });
  } catch { /* silent */ }
}

// Result type priority weights — PRB first, Resource last
const TYPE_WEIGHT = {
  "问题": 2.0,
  "方法": 1.5,
  "主题": 1.3,
  "知识": 1.2,
  "概念": 0.8,
  "资源": 0.4,
};

// Normalize: lowercase, strip ALL non-alphanumeric (incl brackets) for matching
function normalize(str) {
  return (str || "").toLowerCase().replace(/[^a-z0-9\u4e00-\u9fff]/g, "");
}

function weightedScore(item, q) {
  const base = score(item, q) * (TYPE_WEIGHT[item.type] ?? 1.0);
  const nq = normalize(q);

  // Exact full-title match
  if (normalize(item.title) === nq) return base + 300;
  if (item.title_en && normalize(item.title_en) === nq) return base + 300;

  // Word-level prefix match: any word/token in title_en starts with nq
  // Handles "M-CHAT-R/F" → token "mchatrf" starts with "mchat"
  const tokens = (item.title_en || item.title || "").split(/[\s,;]+/).map(normalize).filter(Boolean);
  if (tokens.some(t => t.startsWith(nq) && nq.length >= 3)) return base + 200;

  // Full normalized title starts-with (catches "幼儿自闭症...mchat...")
  const nt = normalize(item.title);
  const nte = normalize(item.title_en || "");
  if (nt.startsWith(nq) || nte.startsWith(nq)) return base + 150;

  // Tag word exact match
  const tagWords = (item.tags || "").split(/\s+/).map(normalize).filter(Boolean);
  if (tagWords.includes(nq)) return base + 200;

  return base;
}

// Returns clarifier config if the query matches a clarifier pattern, else null
function matchClarifier(q) {
  const lq = q.toLowerCase().trim();
  for (const entry of CLARIFIER) {
    for (const pattern of entry.patterns) {
      if (pattern && lq.includes(pattern.toLowerCase())) {
        return entry;
      }
    }
  }
  return null;
}

// 生成词组 token：连续 2–3 字词组 + 完整串，不拆单字避免中文误命中
function tokenize(q) {
  const tokens = new Set();
  tokens.add(q);
  for (let len = 2; len <= 3; len++) {
    for (let i = 0; i <= q.length - len; i++) {
      tokens.add(q.slice(i, i + len));
    }
  }
  return [...tokens];
}

// Relevance scoring
// 完整串命中：title +30 / tags +20 / body +10 / 完全一致 +20
// 词组命中（2–3字）：title +15 / tags +8 / body +3
// Problem alias 完整命中额外 +25（保证"哭"类词优先命中哭相关问题）
function score(item, q) {
  let s = 0;

  // 完整串
  if (item.title.includes(q)) s += 30;
  if (item.tags.includes(q))  s += 20;
  if (item.body.includes(q))  s += 10;
  if (item.title === q)       s += 20;

  // 词组（排除完整串，避免重复计分）
  const tokens = tokenize(q).filter(t => t !== q);
  for (const t of tokens) {
    if (item.title.includes(t)) s += 15;
    if (item.tags.includes(t))  s += 8;
    if (item.body.includes(t))  s += 3;
  }

  // Problem：aliases 精确匹配 + 单字核心词提取
  if (item.type === "问题" && item.aliases) {
    for (const alias of item.aliases) {
      if (!alias) continue;
      if (q.includes(alias))      s += 35; // 搜索词包含完整 alias
      else if (alias.includes(q)) s += 30; // alias 包含搜索词
      else {
        // 词组交集
        const atoks = tokenize(alias);
        for (const t of atoks) {
          if (t.length >= 2 && q.includes(t)) s += 12;
        }
      }
    }
    // 单字核心词：从 q 提取每个字，在 aliases 里查包含
    // 权重低（+6），但能让"哭"命中「一直哭」
    for (const ch of [...q]) {
      for (const alias of item.aliases) {
        if (alias.includes(ch)) s += 6;
      }
    }
  }

  return s;
}

// 按类型分组并排序：问题 → 方法 → 主题 → 概念
const TYPE_ORDER = { "问题": 0, "方法": 1, "主题": 2, "概念": 3 };

function groupAndSort(hits) {
  const groups = { "问题": [], "方法": [], "主题": [], "知识": [], "概念": [], "资源": [] };
  for (const h of hits) {
    if (groups[h.type]) groups[h.type].push(h);
  }
  return groups;
}

// 从 trigger_statements 里选最接近搜索词的一条作推荐理由
function bestTrigger(triggers, q) {
  if (!triggers || !triggers.length) return null;
  const toks = tokenize(q);
  let best = triggers[0], bestScore = 0;
  for (const t of triggers) {
    let s = 0;
    for (const tok of toks) {
      if (t.includes(tok)) s += tok.length >= 3 ? 3 : tok.length >= 2 ? 1 : 0;
    }
    if (s > bestScore) { bestScore = s; best = t; }
  }
  return best;
}

// 生成单个结果卡片 HTML
function cardHtml(h, q, tracking_index) {
  const skin = TYPE_SKIN[h.type] ?? "page";

  // 推荐理由：Method 用 when_to_use；Page 用动态 trigger；其他用 summary
  let whyText = "";
  if (h.type === "问题" && h.search_reason) {
    whyText = h.search_reason;
  } else if (h.type === "方法" && h.why) {
    whyText = h.why;
  } else if (h.type === "主题" && h.triggers) {
    whyText = bestTrigger(h.triggers, q) ?? "";
  } else if (h.type === "知识" && h.triggers) {
    whyText = bestTrigger(h.triggers, q) ?? "";
  }
  const whyHtml = whyText
    ? `<p class="result-why">${whyText}</p>`
    : "";
  const showSummary = h.type !== "主题" && h.type !== "知识" && h.summary && !(h.type === "问题" && h.search_reason);

  return `
    <div class="result-item result-item--${skin}">
      <div class="result-header">
        <span class="result-type result-type--${skin}">${h.type}</span>
      </div>
      <h3 class="result-title">${h.title}</h3>
      ${showSummary ? `<p class="result-summary">${h.summary}</p>` : ''}
      ${whyHtml}
      <div class="result-footer">
        ${confidenceBadgeHtml(h.evidence_grade)}
        <a href="${h.href}" class="result-cta result-cta--${skin}"
           data-analytics-id="${h.analytics_id ?? ''}"
           data-analytics-type="${h.analytics_type ?? ''}"
           data-analytics-index="${tracking_index}"
           data-analytics-url="${h.href}">${
          h.type === "问题" ? "查看这个问题 →" :

// 生成分组区块 HTML（传入 q 供 cardHtml 动态选 trigger）

// 返回 { html: string, nextIndex: number }
function sectionHtml(label, items, q, tracking_index_start) {
  if (!items.length) return { html: "", nextIndex: tracking_index_start };
  let idx = tracking_index_start;
  const cardsHtml = items.map(h => cardHtml(h, q, idx++)).join('');
  return {
    html: `
    <div class="result-section">
      <p class="result-section-label">${label}</p>
      ${cardsHtml}
    </div>
  `,
    nextIndex: idx,
  };
}

// options.source: 触发来源（正式搜索时传入）
// options.trackQuery: true = 正式搜索，记录 Analytics；false = 实时预览，不记录
function doSearch(options) {
  const source = (options && options.source) || 'keyboard';
  const trackQuery = (options && options.trackQuery === true);

  const rawQ = inputEl.value.trim();
  const q = rawQ.toLowerCase();
  if (!q) { reset(); return; }
  suggestEl.style.display = 'none';
  _topProblemHref = null;

  // ── Clarifier + normal search ───────────────────────────
  const clarifier = matchClarifier(q);
  const hasClarifier = Boolean(clarifier);

  const hits = INDEX
    .map(item => ({ item, s: weightedScore(item, q) }))
    .filter(({ s }) => s > 0)
    .sort((a, b) => b.s - a.s)
    .map(({ item }) => item);

  // ── Analytics: 正式搜索时记录 search.query ───────────────
  if (trackQuery) {
    _anaCurrentSearchId = _anaGenId();
    _anaCurrentQuery = rawQ;
    const resultCount = hits.length;
    _anaTrackQuery(_anaCurrentSearchId, rawQ, resultCount, source);
    // Clarifier shown（同一次正式搜索最多记录一次）
    if (hasClarifier) {
      const clarifierLabels = (clarifier.options || []).map(opt => opt.label);
      _anaTrackClarifierShown(_anaCurrentSearchId, rawQ, clarifierLabels);
    }
  }

  // No results AND no clarifier → show empty state
  if (!hits.length && !hasClarifier) {
    answerEl.style.display  = 'none';
    resultsEl.style.display = 'none';
    noResEl.style.display   = 'block';
    return;
  }

  noResEl.style.display = 'none';

  if (hasClarifier) {
    // Clarifier takes over answerEl; resultsEl is built but hidden
    answerEl.style.display = 'block';
    answerEl.innerHTML = `
      <div class="clarifier-banner">
        <p class="clarifier-prompt">${clarifier.displayText || '你描述的情况更接近哪一种？'}</p>
        <div class="clarifier-options">
          ${clarifier.options.map((opt, idx) => `
            <a href="${opt.route}" class="clarifier-option"
               data-analytics-clarifier-value="${opt.label}"
               data-analytics-clarifier-index="${idx}"
               data-analytics-clarifier-url="${opt.route}">${opt.label}</a>
          `).join('')}
        </div>
        <button class="clarifier-skip" type="button"
          onclick="document.getElementById('answer-banner').style.display='none';document.getElementById('results').style.display='block'">
          继续搜索「${rawQ}」→
        </button>
      </div>
    `;
    resultsEl.style.display = 'none';
  } else {
    // Normal flow: top problem card
    answerEl.style.display = 'block';
    answerEl.innerHTML = topProblemCardHtml(q, rawQ);
  }

  // ── 分组渲染：问题 → 方法 → 主题 → 概念 ──
  const groups = groupAndSort(hits);
  const footerHtml = `
    <div class="search-footer">
      <p class="search-footer-text">没有找到完全符合的情况，也很正常。<br>很多家长第一次都不知道该怎么描述——可以换一种说法试试。</p>
      <ul class="search-footer-list">
        <li><button class="search-footer-option" data-kw="孩子不说话" type="button">我更担心语言</button></li>
        <li><button class="search-footer-option" data-kw="睡不好" type="button">我更担心睡眠</button></li>
        <li><button class="search-footer-option" data-kw="不知道怎么办" type="button">我不知道怎么描述</button></li>
        <li><button class="search-footer-option search-footer-browse" data-kw="" type="button">浏览全部问题</button></li>
      </ul>
      <button class="search-footer-reset" type="button">重新搜索</button>
    </div>
  `;
  // Only show results if no clarifier is active
  if (!hasClarifier) resultsEl.style.display = 'block';
  // 排除顶部已推荐的 Problem，避免重复
  // 顶部推荐 Problem 已分配 tracking_index = 0，分组结果从 1 开始
  const otherProblems = groups["问题"].filter(h => h.href !== _topProblemHref);
  const hasTopProblem = Boolean(_topProblemHref);
  let trackIdx = hasTopProblem ? 1 : 0;

  const s1 = sectionHtml("你可能遇到的问题", otherProblems, q, trackIdx);
  trackIdx = s1.nextIndex;
  const s2 = sectionHtml("知识文章", groups["知识"], q, trackIdx);
  trackIdx = s2.nextIndex;
  const s3 = sectionHtml("可以先参考的方法", groups["方法"], q, trackIdx);
  trackIdx = s3.nextIndex;
  const s4 = sectionHtml("推荐阅读", groups["主题"], q, trackIdx);
  trackIdx = s4.nextIndex;
  const s5 = sectionHtml("概念解释", groups["概念"], q, trackIdx);
  trackIdx = s5.nextIndex;
  const s6 = sectionHtml("专业工具与量表", groups["资源"], q, trackIdx);

  resultsEl.innerHTML = [
    s1.html, s2.html, s3.html, s4.html, s5.html, s6.html,
    footerHtml,
  ].join('');

  // 底部引导 chip 绑定事件
  resultsEl.querySelectorAll('.search-footer-option, .search-footer-reset').forEach(chip => {
    chip.addEventListener('click', () => {
      if (chip.classList.contains('search-footer-browse')) {
        window.location.href = '/problems';
        return;
      }
      if (chip.classList.contains('search-footer-reset')) {
        inputEl.value = '';
        reset();
      } else {
        inputEl.value = chip.dataset.kw;
        doSearch({ source: 'suggestion', trackQuery: true });
      }
      inputEl.focus();
    });
  });
}

function reset() {
  answerEl.style.display  = 'none';
  resultsEl.style.display = 'none';
  noResEl.style.display   = 'none';
  suggestEl.style.display = 'block';
}

btnEl.addEventListener('click', () => doSearch({ source: 'button', trackQuery: true }));
inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch({ source: 'keyboard', trackQuery: true }); });
inputEl.addEventListener('input', () => doSearch({ trackQuery: false }));
suggestEl.addEventListener('click', e => {
  const chip = e.target.closest('.kw-chip');
  if (!chip) return;
  inputEl.value = chip.dataset.kw;
  doSearch({ source: 'suggestion', trackQuery: true });
  inputEl.focus();
});

// ── Analytics: 结果点击事件委托 ──────────────────────────────
// 监听 answer-banner（顶部推荐 + Clarifier）和 results（分组结果）
[answerEl, resultsEl].forEach(container => {
  container.addEventListener('click', e => {
    // 结果点击（top-problem-cta 和 result-cta）
    const resultLink = e.target.closest('[data-analytics-id][data-analytics-type][data-analytics-index]');
    if (resultLink && !resultLink.hasAttribute('data-analytics-clarifier-value')) {
      const id = resultLink.dataset.analyticsId;
      const type = resultLink.dataset.analyticsType;
      const index = parseInt(resultLink.dataset.analyticsIndex, 10);
      const url = resultLink.dataset.analyticsUrl || resultLink.getAttribute('href') || '';
      if (id && type && _anaCurrentSearchId) {
        _anaTrackResultClick(_anaCurrentSearchId, _anaCurrentQuery, id, type, index, url);
      }
    }

    // Clarifier 点击
    const clarifierLink = e.target.closest('[data-analytics-clarifier-value]');
    if (clarifierLink && _anaCurrentSearchId) {
      const value = clarifierLink.dataset.analyticsClarifierValue || '';
      const index = parseInt(clarifierLink.dataset.analyticsClarifierIndex || '0', 10);
      const url = clarifierLink.dataset.analyticsClarifierUrl || clarifierLink.getAttribute('href') || '';
      _anaTrackClarifierClick(_anaCurrentSearchId, _anaCurrentQuery, value, index, url);
      // 不阻止原有跳转行为
    }
  });
});
})();</script>   </body></html>
